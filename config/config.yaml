# Path to a text file listing input genome assembly FASTA paths (one per line).
# ggCaller accepts assembled genomes via --refs (flag name is ggCaller convention).
refs: "/path/to/assembly_list.txt"
reads: null  # ggCaller accepts raw reads via --reads (flag name is ggCaller convention). Set to null if not using.

# Base output directory for all pipeline results
output_dir: "results_test"

# ggCaller gene prediction settings
ggcaller:
  # CLI arguments passed directly to ggcaller.
  # Example: "--save --kmer 31 --balrog-db /path/to/balrog/db"
  cli_args: "--save"

# Panaroo gene clustering settings
panaroo:
  # CLI arguments passed directly to panaroo.
  # Example: "--clean-mode moderate -a core --remove-invalid-genes"
  cli_args: "--clean-mode moderate"

# Bakta protein annotation settings
bakta:
  # REQUIRED: set this to your local Bakta database directory.
  db: "/path/to/bakta/db"
